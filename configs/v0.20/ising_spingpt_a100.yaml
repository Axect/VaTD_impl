# v0.20 Spin-GPT: Autoregressive Transformer for 2D Ising Model (A100)
#
# A100-optimized config: larger batch and full-size Transformer.
# Tests architecture independence of the low-rank phenomenon.
# Same VaTD training objective (REINFORCE + variational free energy),
# but replaces the PixelCNN backbone with a causal Transformer.
#
# A100 has 40/80GB VRAM, allowing much larger batches.
# KV-cache sampling reduces memory from O(L³) to O(L²).
# batch_size × num_beta × accumulation_steps = 512 × 8 × 16 = 65,536 samples/epoch

project: Ising_VaTD_v0.20
device: cuda:0
net: model_transformer.SpinGPT
optimizer: torch.optim.AdamW
scheduler: hyperbolic_lr.ExpHyperbolicLR
epochs: 250
batch_size: 512
seeds: [42]

net_config:
  # Lattice configuration
  size: 16
  fix_first: 1
  category: 2  # Ising: {0,1} → {-1,+1}

  # Temperature sampling configuration
  batch_size: 512
  num_beta: 8
  beta_min: 0.2
  beta_max: 1.0

  # Training Mode: Sequential with gradient accumulation
  training_mode: sequential
  accumulation_steps: 16

  # MCMC: DISABLED (pure REINFORCE)
  mcmc_enabled: false

  # A100 CUDA backend
  cudnn_benchmark: true

  # 2-Phase Curriculum Learning
  curriculum_enabled: true
  phase1_epochs: 50
  phase1_beta_max: 0.35
  phase2_epochs: 100

  # Transformer architecture (full-size)
  d_model: 192
  n_heads: 6
  n_layers: 6
  d_ff: 768
  cond_dim: 64
  dropout: 0.0

  # 2D Periodic Relative Position Bias (PBC lattice topology)
  use_rel_pos_bias: true

  # AMP (bfloat16 for A100 — REINFORCE-safe)
  use_amp: true

  # Temperature-dependent Output Scaling (Parameter-free)
  logit_temp_scale: true
  temp_scale_min: 0.1
  temp_scale_max: 2.0

optimizer_config:
  lr: 3.e-4
  weight_decay: 1.e-2

scheduler_config:
  upper_bound: 300
  max_iter: 250
  infimum_lr: 1.e-6

early_stopping_config:
  enabled: false
