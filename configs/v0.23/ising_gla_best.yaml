# v0.23 LatticeGLA - Best model (300 epochs)
# Best trial value: -396.1869201660156
# Source: runs/Ising_VaTD_v0.23_Opt/LatticeFLA_lr4e-2_e10_0409da[97]

project: Ising_VaTD_v0.23
device: cuda:0
net: model_fla.LatticeFLA
optimizer: splus.SPlus
scheduler: hyperbolic_lr.ExpHyperbolicLR
epochs: 300
batch_size: 64
seeds: [42]

net_config:
  # Lattice configuration
  size: 16
  fix_first: 1
  category: 2

  # Temperature sampling
  batch_size: 64
  num_beta: 8
  beta_min: 0.1
  beta_max: 2.0

  # Training Mode
  training_mode: sequential
  accumulation_steps: 32

  mcmc_enabled: false
  cudnn_benchmark: true
  curriculum_enabled: false

  # GLA architecture
  fla_layer: gla
  d_model: 128
  n_layers: 6
  num_heads: 8
  expand_k: 1.0
  expand_v: 2.0
  use_short_conv: true
  conv_size: 8
  cond_dim: 64

  # GLA-specific
  use_output_gate: true
  gate_low_rank_dim: 16

  # Temperature-dependent Output Scaling
  logit_temp_scale: true
  temp_scale_min: 0.1
  temp_scale_max: 2.0

  # Zero-Variance Effective Action Loss
  alpha_zv: 0.003471238714444483

  # Variance-Based Adaptive Temperature Sampling
  adaptive_sampling_enabled: true
  adaptive_sampling_warmup: 20
  adaptive_sampling_num_bins: 32
  adaptive_sampling_kappa: 1.0
  adaptive_sampling_epsilon: 1.0e-6
  adaptive_sampling_momentum: 0.95

optimizer_config:
  lr: 0.03874965373164518
  eps: 1.e-10

scheduler_config:
  upper_bound: 350
  max_iter: 300
  infimum_lr: 1.483332026983102e-06

early_stopping_config:
  enabled: false
