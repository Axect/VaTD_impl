# v0.23 LatticeGLA: Gated Linear Attention backbone for architecture-independent eRank
#
# Third architecture witness (after PixelCNN v0.18, LatticeGPT v0.21).
# Uses fla library (Triton kernels) for O(L) training and O(1) per-step sampling.
# Paper label: "Gated Linear Recurrence"
#
# batch_size × num_beta × accumulation_steps = 64 × 8 × 32 = 16,384 samples/epoch

project: Ising_VaTD_v0.23
device: cuda:0
net: model_fla.LatticeFLA
optimizer: splus.SPlus
scheduler: hyperbolic_lr.ExpHyperbolicLR
epochs: 300
batch_size: 64
seeds: [42]

net_config:
  # Lattice configuration
  size: 16
  fix_first: 1
  category: 2  # Ising: {0,1} → {-1,+1}

  # Temperature sampling configuration (expanded range)
  batch_size: 64
  num_beta: 8
  beta_min: 0.1   # T_max = 10
  beta_max: 2.0   # T_min = 0.5

  # Training Mode: Sequential with gradient accumulation
  training_mode: sequential
  accumulation_steps: 32

  # MCMC: DISABLED (pure REINFORCE + zero-variance loss)
  mcmc_enabled: false

  # CUDA backend
  cudnn_benchmark: true

  # Curriculum: DISABLED (replaced by adaptive sampling)
  curriculum_enabled: false

  # fla layer selection (swap to test different architectures)
  fla_layer: gla                # Options: gla, gated_deltanet
  d_model: 128
  n_layers: 4
  num_heads: 4
  expand_k: 1.0                 # key_dim = d_model (override default 0.5)
  expand_v: 1.0                 # value_dim = d_model
  use_short_conv: true
  conv_size: 4
  cond_dim: 64

  # GLA-specific
  use_output_gate: true
  gate_low_rank_dim: 16

  # Temperature-dependent Output Scaling
  logit_temp_scale: true
  temp_scale_min: 0.1
  temp_scale_max: 2.0

  # Zero-Variance Effective Action Loss
  alpha_zv: 0.01

  # Variance-Based Adaptive Temperature Sampling
  adaptive_sampling_enabled: true
  adaptive_sampling_warmup: 20
  adaptive_sampling_num_bins: 32
  adaptive_sampling_kappa: 1.0
  adaptive_sampling_epsilon: 1.0e-6
  adaptive_sampling_momentum: 0.95

optimizer_config:
  lr: 1.e-1
  eps: 1.e-10

scheduler_config:
  upper_bound: 350
  max_iter: 300
  infimum_lr: 1.e-6

early_stopping_config:
  enabled: false
