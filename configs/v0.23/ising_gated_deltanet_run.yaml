# v0.23 LatticeGDN - Quick run for HPO (10 epochs)
# Use with *_opt.yaml for hyperparameter search
# Note: d_model fixed at 64; head_dim = d_model / num_heads = 16
# batch_size × num_beta × accumulation_steps = 64 × 8 × 32 = 16,384 samples/epoch

project: Ising_VaTD_v0.23
device: cuda:0
net: model_fla.LatticeFLA
optimizer: splus.SPlus
scheduler: hyperbolic_lr.ExpHyperbolicLR
epochs: 10
batch_size: 64
seeds: [42]

net_config:
  size: 16
  fix_first: 1
  category: 2

  batch_size: 64
  num_beta: 8
  beta_min: 0.1
  beta_max: 2.0

  training_mode: sequential
  accumulation_steps: 32

  mcmc_enabled: false
  cudnn_benchmark: true
  curriculum_enabled: false

  # Gated DeltaNet architecture (small width for HPO)
  fla_layer: gated_deltanet
  d_model: 64
  n_layers: 4
  num_heads: 4
  head_dim: 16               # d_model / num_heads
  expand_v: 1.0
  use_gate: true
  use_short_conv: true
  conv_size: 4
  cond_dim: 64

  logit_temp_scale: true
  temp_scale_min: 0.1
  temp_scale_max: 2.0

  alpha_zv: 0.01

  # Adaptive sampling disabled for HPO runs
  adaptive_sampling_enabled: false
  adaptive_sampling_warmup: 3
  adaptive_sampling_num_bins: 32
  adaptive_sampling_kappa: 1.0
  adaptive_sampling_epsilon: 1.0e-6
  adaptive_sampling_momentum: 0.95

optimizer_config:
  lr: 1.e-1
  eps: 1.e-10

scheduler_config:
  upper_bound: 300
  max_iter: 150
  infimum_lr: 1.e-6

early_stopping_config:
  enabled: false
