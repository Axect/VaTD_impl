# v0.21 Spin-GPT: Model-Agnostic Improvements for Tc Accuracy (A100)
#
# A100-optimized: larger batch, full-size Transformer.
# Changes from v0.20:
# 1. Zero-variance effective action loss (alpha_zv)
# 2. 2D relative position bias (use_rel_pos_bias)
# 3. Curriculum learning REMOVED — replaced by adaptive temperature sampling
# 4. Training range expanded: β ∈ [0.1, 2.0] (T ∈ [0.5, 10])
# 5. Variance-based adaptive temperature sampling (warmup → adaptive)
#
# batch_size × num_beta × accumulation_steps = 512 × 8 × 16 = 65,536 samples/epoch

project: Ising_VaTD_v0.21
device: cuda:0
net: model_transformer.SpinGPT
optimizer: torch.optim.AdamW
scheduler: hyperbolic_lr.ExpHyperbolicLR
epochs: 300
batch_size: 512
seeds: [42]

net_config:
  # Lattice configuration
  size: 16
  fix_first: 1
  category: 2  # Ising: {0,1} → {-1,+1}

  # Temperature sampling configuration (expanded range)
  batch_size: 512
  num_beta: 8
  beta_min: 0.1   # T_max = 10
  beta_max: 2.0   # T_min = 0.5

  # Training Mode: Sequential with gradient accumulation
  training_mode: sequential
  accumulation_steps: 16

  # MCMC: DISABLED (pure REINFORCE + zero-variance loss)
  mcmc_enabled: false

  # A100 CUDA backend
  cudnn_benchmark: true

  # Curriculum: DISABLED (replaced by adaptive sampling)
  curriculum_enabled: false

  # Transformer architecture (full-size)
  d_model: 192
  n_heads: 6
  n_layers: 6
  d_ff: 768
  cond_dim: 64
  dropout: 0.0

  # 2D Periodic Relative Position Bias (PBC lattice topology)
  use_rel_pos_bias: true

  # AMP (bfloat16 for A100 — REINFORCE-safe)
  use_amp: true

  # Temperature-dependent Output Scaling
  logit_temp_scale: true
  temp_scale_min: 0.1
  temp_scale_max: 2.0

  # Zero-Variance Effective Action Loss (v0.21)
  alpha_zv: 0.01

  # Variance-Based Adaptive Temperature Sampling (v0.21)
  adaptive_sampling_enabled: true
  adaptive_sampling_warmup: 20
  adaptive_sampling_num_bins: 32
  adaptive_sampling_kappa: 1.0
  adaptive_sampling_epsilon: 1.0e-6
  adaptive_sampling_momentum: 0.95

optimizer_config:
  lr: 3.e-4
  weight_decay: 1.e-2

scheduler_config:
  upper_bound: 350
  max_iter: 300
  infimum_lr: 1.e-6

early_stopping_config:
  enabled: false
