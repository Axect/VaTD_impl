study_name: LatticeGPT_TPE
trials: 100
seed: 42
metric: val_loss
direction: minimize

sampler:
  name: optuna.samplers.TPESampler

pruner:
  name: pruner.PFLPruner
  kwargs:
    n_startup_trials: 10
    n_warmup_epochs: 3
    top_k: 10
    target_epoch: 10

search_space:
  net_config:
    n_heads:
      type: categorical
      choices: [4, 8]
    n_layers:
      type: int
      min: 2
      max: 6
    cond_dim:
      type: categorical
      choices: [32, 64, 128]
    use_rel_pos_bias:
      type: categorical
      choices: [false, true]
    alpha_zv:
      type: float
      min: 1.e-3
      max: 1.e-1
      log: true
  optimizer_config:
    lr:
      type: float
      min: 1.e-2
      max: 1.e+0
      log: true
  scheduler_config:
    infimum_lr:
      type: float
      min: 1.e-7
      max: 1.e-4
      log: true
